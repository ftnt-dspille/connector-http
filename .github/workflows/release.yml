name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build connector tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tar -czf "connector-http-${VERSION}.tgz" http/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "HTTP Connector v${{ steps.version.outputs.version }}"
          body_path: http/release_notes.md
          files: "connector-http-${{ steps.version.outputs.version }}.tgz"
